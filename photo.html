<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Photo | Last Trace</title>

    <link rel="stylesheet" href="photo.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

</head>


<body>


<header class="photo-header">

    <a href="index.html" class="logo">
        Last Trace
    </a>

</header>



<main class="photo-container">


    <section class="photo-main">


        <div class="photo-image-area">

            <img id="photo-image" src="" alt="">

        </div>



        <div class="photo-info">


            <h1 id="photo-title">
            </h1>


            <p id="photo-description">
            </p>



            <div class="photo-data">


                <div>
                    <span>Date</span>
                    <p id="photo-date"></p>
                </div>


                <div>
                    <span>Camera</span>
                    <p id="photo-camera"></p>
                </div>


                <div>
                    <span>Setting</span>
                    <p id="photo-setting"></p>
                </div>


            </div>


        </div>


    </section>



    <a href="index.html#gallery" class="back-button">

        Back to Gallery

    </a>



</main>



<script src="photos.js"></script>
<script src="script.js"></script>


</body>

</html>
